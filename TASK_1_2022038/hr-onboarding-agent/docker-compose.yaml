services:
  agent:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - chroma
    environment:
      LANGSMITH_TRACING: "${LANGSMITH_TRACING:-false}"
      LANGCHAIN_TRACING_V2: "${LANGCHAIN_TRACING_V2:-false}"
      VECTOR_DB_URL: "http://chroma:8000"
      CHECKPOINT_DB_PATH: "/app/persistence/checkpoints/checkpoint_db.sqlite"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      LANGSMITH_API_KEY: "${LANGSMITH_API_KEY:-}"
    volumes:
      - checkpoint_data:/app/persistence/checkpoints
      - feedback_data:/app/persistence/feedback
  ui:
    build: .
    command: streamlit run app.py --server.address=0.0.0.0 --server.port=8501
    ports:
      - "8501:8501"
    depends_on:
      - agent
    environment:
      API_BASE_URL: "http://agent:8000"
    volumes:
      - feedback_data:/app/persistence/feedback
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - vector_data:/chroma/chroma

volumes:
  checkpoint_data:
  feedback_data:
  vector_data:
